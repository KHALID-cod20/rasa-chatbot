services:
  rasa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rasa_server
    ports:
      - "5005:5005"
    volumes:
      - .:/app
    command: ["run", "--enable-api", "--cors", "*", "-i", "0.0.0.0", "-p", "5005"]
    depends_on:
      - action_server

  action_server:
    image: rasa/rasa-sdk:3.6.2
    container_name: rasa_actions
    volumes:
      - ./actions:/app/actions
    ports:
      - "5055:5055"
    command: ["start", "--actions", "actions"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatbot_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - rasa