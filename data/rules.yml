version: "3.1"

rules:

- rule: Répondre au salut
  steps:
    - intent: greet
    - action: utter_greet

- rule: Répondre au goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Répondre aux remerciements
  steps:
    - intent: thank_you
    - action: utter_thank_you

- rule: fallback rule
  steps:
    - intent: nlu_fallback
    - action: utter_default